<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>{% block title %}Secure Access - ShariahEase{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/main.css"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-error": "#690005", "surface-container-highest": "#33343c", "outline-variant": "#3c4a42",
            "on-surface": "#e2e1eb", "inverse-surface": "#e2e1eb", "surface-bright": "#383940",
            "on-secondary-container": "#bab8b7", "on-primary-fixed-variant": "#005236", "secondary-fixed": "#e5e2e1",
            "on-tertiary-fixed-variant": "#474746", "on-tertiary-fixed": "#1b1b1b", "primary-container": "#10b981",
            "on-secondary": "#313030", "on-error-container": "#ffdad6", "on-surface-variant": "#bbcabf",
            "primary": "#4edea3", "on-secondary-fixed-variant": "#474646", "on-tertiary-container": "#393939",
            "surface": "#12131a", "on-background": "#e2e1eb", "secondary-fixed-dim": "#c8c6c5",
            "tertiary": "#c8c6c5", "outline": "#86948a", "surface-tint": "#4edea3", "inverse-on-surface": "#2f3037",
            "on-primary-container": "#00422b", "tertiary-fixed-dim": "#c8c6c5", "secondary": "#c8c6c5",
            "surface-container-high": "#282a31", "on-primary": "#003824", "tertiary-container": "#a4a2a2",
            "on-secondary-fixed": "#1c1b1b", "inverse-primary": "#006c49", "on-primary-fixed": "#002113",
            "background": "#12131a", "on-tertiary": "#313030", "surface-container-low": "#1a1b22",
            "primary-fixed": "#6ffbbe", "tertiary-fixed": "#e5e2e1", "surface-variant": "#33343c",
            "error": "#ffb4ab", "surface-container-lowest": "#0c0e14", "primary-fixed-dim": "#4edea3",
            "error-container": "#93000a", "secondary-container": "#4a4949", "surface-dim": "#12131a",
            "surface-container": "#1e1f26"
          },
          "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          "spacing": { "gutter": "16px", "stack-sm": "4px", "margin-desktop": "32px", "margin-mobile": "16px", "sidebar-width": "208px", "stack-md": "8px", "stack-lg": "16px" },
          "fontFamily": {
            "urdu-body": ["Noto Nastaliq Urdu"], "body-md": ["Inter"], "label-md": ["Inter"],
            "headline-md": ["Inter"], "body-lg": ["Inter"], "headline-lg": ["Inter"], "headline-xl": ["Inter"]
          },
          "fontSize": {
            "urdu-body": ["18px", {"lineHeight": "32px", "fontWeight": "400"}],
            "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
            "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500"}],
            "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
            "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.015em", "fontWeight": "600"}],
            "headline-xl": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body class="bg-[#0a0a0a] min-h-screen flex items-center justify-center font-body-md text-body-md px-margin-mobile">
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
