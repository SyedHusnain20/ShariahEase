{% extends "auth_base.html" %}
{% block content %}
<div class="w-full max-w-sm">
  <!-- Login Card -->
  <div class="bg-[#141414] border border-[#262626] rounded-xl overflow-hidden flex flex-col shadow-2xl" id="login-card">
    
    <!-- Error banner -->
    <div id="error-banner" class="hidden bg-[#2d0a0a] border-b border-error/20 px-stack-lg py-3 flex items-center gap-3">
      <span class="material-symbols-outlined text-error text-[20px]" data-icon="error">error</span>
      <span class="text-error font-label-md text-label-md"></span>
    </div>

    <div class="px-stack-lg pt-stack-lg pb-stack-md flex flex-col items-center text-center">
      <div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-stack-lg">
        <span class="material-symbols-outlined text-on-primary-container text-[28px]" data-icon="account_balance">account_balance</span>
      </div>
      <h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm">Welcome Back</h1>
      <p class="font-body-md text-body-md text-on-surface-variant">Access your Shariah-compliant portfolio</p>
    </div>
    
    <div class="p-stack-lg space-y-stack-lg">
      <div class="space-y-stack-sm">
        <label class="font-label-md text-label-md text-on-surface-variant px-1">Email Address</label>
        <input id="email" class="field-input" placeholder="investor@shariahease.com" required type="email"/>
      </div>
      
      <div class="space-y-stack-sm">
        <div class="flex justify-between items-center px-1">
          <label class="font-label-md text-label-md text-on-surface-variant">Password</label>
          <a class="text-primary font-label-md text-label-md hover:underline" href="#">Forgot?</a>
        </div>
        <input id="password" class="field-input" placeholder="••••••••" required type="password"/>
      </div>
      
      <button id="login-btn" onclick="login()" class="w-full bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-headline-md text-body-md py-3.5 rounded-lg transition-all active:scale-95 font-semibold flex items-center justify-center gap-2" type="button">
        <span id="btn-text">Sign In</span>
        <svg id="btn-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
      </button>
      
      <div class="relative py-2 flex items-center">
        <div class="flex-grow border-t border-[#262626]"></div>
        <span class="flex-shrink mx-4 font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">or</span>
        <div class="flex-grow border-t border-[#262626]"></div>
      </div>
      
      <button disabled class="w-full border border-[#262626] text-on-surface-variant/40 font-body-md text-body-md py-3 rounded-lg flex items-center justify-center gap-3 cursor-not-allowed" type="button" title="Coming soon">
        <svg class="w-5 h-5 opacity-40" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path>
        </svg>
        Continue with Google <span class="text-[10px] ml-1 opacity-50">(coming soon)</span>
      </button>
    </div>
    
    <div class="bg-surface-container-low p-stack-lg border-t border-[#262626] text-center">
      <p class="font-body-md text-body-md text-on-surface-variant">
        Don't have an account? 
        <a class="text-primary font-semibold hover:underline" href="/auth/signup">Create account</a>
      </p>
    </div>
  </div>
  
  <!-- Footer Links -->
  <div class="mt-stack-lg flex justify-center gap-6">
    <a class="font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-colors" href="#">Privacy</a>
    <a class="font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-colors" href="#">Support</a>
    <a class="font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-colors" href="#">Compliance</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  if (localStorage.getItem('se_token')) {
    window.location.href = '/';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const banner   = document.getElementById('error-banner');
    const bannerText = banner.querySelector('.text-error.font-label-md');
    const btn      = document.getElementById('login-btn');
    const spinner  = document.getElementById('btn-spinner');
    const btnText  = document.getElementById('btn-text');

    banner.classList.add('hidden');

    if (!email || !password) {
      showError('Please fill in both fields.');
      return;
    }

    btn.disabled = true;
    spinner.classList.remove('hidden');
    btnText.textContent = 'Signing in…';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || 'Login failed. Check your credentials.');
        return;
      }

      localStorage.setItem('se_token', data.access_token);
      localStorage.setItem('se_user',  JSON.stringify({ id: data.user_id, name: data.name, email: data.email }));

      window.location.href = '/';
    } catch (err) {
      showError('Network error. Please try again.');
    } finally {
      btn.disabled = false;
      spinner.classList.add('hidden');
      btnText.textContent = 'Sign In';
    }
  }

  function showError(msg) {
    const banner = document.getElementById('error-banner');
    const bannerText = banner.querySelector('.text-error.font-label-md');
    bannerText.textContent = msg;
    banner.classList.remove('hidden');
  }
</script>
{% endblock %}
